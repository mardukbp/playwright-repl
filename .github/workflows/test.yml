name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  test:
    name: test (${{ matrix.os }}, node 22)
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and type check
        run: pnpm run build

      - name: Run tests
        run: pnpm -r run test

      - name: Lint extension
        run: pnpm run lint
        working-directory: packages/extension

      - name: Install Playwright browsers
        run: pnpm exec playwright install ${{ runner.os == 'Linux' && '--with-deps' || '' }} chromium chrome
        working-directory: packages/extension

      - name: Run extension component tests
        run: pnpm run test:component
        working-directory: packages/extension

      - name: Run CLI E2E tests
        run: node dist/playwright-repl.js --replay examples/
        working-directory: packages/cli

      - name: Run bridge replay E2E tests
        run: node e2e/test-bridge-replay.js
        working-directory: packages/cli

      - name: Run runner E2E tests (192 tests via pw-cli)
        run: node ../dist/pw-cli.js test --workers 2 --reporter list
        working-directory: packages/runner/examples
        timeout-minutes: 10
        env:
          FORCE_COLOR: '1'

      - name: Run extension E2E tests
        run: pnpm exec playwright test
        working-directory: packages/extension

      - name: Merge extension coverage
        run: pnpm run coverage:merge
        working-directory: packages/extension
