name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and type check
        run: pnpm run build

      - name: Run tests
        run: pnpm -r run test

      - name: Lint extension
        run: pnpm run lint
        working-directory: packages/extension

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium
        working-directory: packages/extension

      - name: Run extension component tests
        run: pnpm run test:component
        working-directory: packages/extension

      - name: Run CLI E2E tests
        run: node dist/playwright-repl.js --replay examples/
        working-directory: packages/cli

      - name: Run CLI E2E tests (include-snapshot)
        run: node dist/playwright-repl.js --replay examples/ --include-snapshot --verbose
        working-directory: packages/cli

      - name: Run bridge replay E2E tests
        run: node e2e/test-bridge-replay.js
        working-directory: packages/cli

      - name: Run bridge replay E2E tests (include-snapshot)
        run: node e2e/test-bridge-replay.js --include-snapshot --verbose
        working-directory: packages/cli

      - name: Run runner E2E tests (23 todomvc tests via bridge)
        run: node ../dist/cli.js test
        working-directory: packages/runner/examples

      - name: Run extension E2E tests
        run: pnpm exec playwright test
        working-directory: packages/extension

      - name: Merge extension coverage
        run: pnpm run coverage:merge
        working-directory: packages/extension
