<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recording Test Page</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        label { display: block; margin: 8px 0; }
        input[type="text"] { padding: 4px; }
        button { padding: 6px 12px; margin: 4px; }
        /* TodoMVC-style: delete buttons hidden until hover */
        .todo-item .destroy { display: none; }
        .todo-item:hover .destroy { display: inline-block; }
    </style>
</head>
<body>
    <h1>Recording Fixture</h1>

    <label>Name <input type="text" /></label>
    <label><input type="checkbox" /> Accept terms</label>
    <button>Submit</button>

    <!-- TodoMVC-style list: delete buttons hidden until hover -->
    <ul class="todo-list">
        <li class="todo-item"><span>reading</span><button class="destroy">Delete</button></li>
        <li class="todo-item"><span>shopping</span><button class="destroy">Delete</button></li>
        <li class="todo-item"><span>learning</span><button class="destroy">Delete</button></li>
    </ul>

    <!-- Single-item edge case: only one hover-revealed button -->
    <ul class="single-todo">
        <li class="todo-item"><span>only item</span><button class="destroy">Delete</button></li>
    </ul>

    <!-- Legacy table form: labels in adjacent cells, no <label> association (#768) -->
    <h2>Legacy Form</h2>
    <table border="1" cellpadding="5">
        <tr>
            <td><span class="_LabelClass">Benutzerkennung:*</span></td>
            <td><input type="text" required size="20" name="LoginName" id="LoginName" value="" maxlength="40"></td>
        </tr>
    </table>

    <!-- Table with repeated action buttons per row -->
    <h2>Users</h2>
    <table border="1" cellpadding="8">
        <thead><tr><th>Name</th><th>Email</th><th>Actions</th></tr></thead>
        <tbody>
            <tr><td>Alice</td><td>alice@example.com</td><td><button>Edit</button> <button>Delete</button></td></tr>
            <tr><td>Bob</td><td>bob@example.com</td><td><button>Edit</button> <button>Delete</button></td></tr>
            <tr><td>Carol</td><td>carol@example.com</td><td><button>Edit</button> <button>Delete</button></td></tr>
        </tbody>
    </table>
</body>
</html>
